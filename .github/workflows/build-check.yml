# Pre-release sanity build: compile the app and produce (but don't publish)
# installers on every platform the release workflow targets. Run manually
# before tagging, or rely on the push trigger for src-tauri changes.
name: Build check

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src-tauri/**"
      - "src/**"
      - "package*.json"
      - ".github/workflows/build-check.yml"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
          - platform: ubuntu-22.04
          - platform: windows-latest
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential curl wget file \
            libxdo-dev libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev patchelf

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      # Full bundling (not --no-bundle) so installer generation is exercised
      # too — updater artifacts are skipped since no signing key is present.
      - name: Build app + installers
        # bash on every runner so the quoted JSON --config survives intact
        # (the Windows runner's default PowerShell would mangle it).
        shell: bash
        run: npm run tauri build -- --config '{"bundle":{"createUpdaterArtifacts":false}}'
