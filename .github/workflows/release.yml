# SPDX-License-Identifier: LicenseRef-PolyForm-Noncommercial-1.0.0
# Build installable binaries and attach them to a GitHub Release on every v* tag.
#
# macOS  → universal .dmg (Apple Silicon + Intel). Code-signing + notarization
#          happen automatically IF the APPLE_* secrets are set; otherwise the
#          .dmg is unsigned (users right-click → Open the first time).
# Linux  → .AppImage / .deb / .rpm (no signing gate).
name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
            rust-targets: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential curl wget file \
            libxdo-dev libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev patchelf

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing — required for self-update to verify downloads.
          # Add TAURI_SIGNING_PRIVATE_KEY as a repo secret (contents of
          # ~/.tauri/cairn-updater.key). Password is empty for this key.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS Developer ID signing + notarization.
          # Currently DISABLED — with no Apple Developer cert, passing empty
          # APPLE_* values makes Tauri attempt (and fail) an empty codesign.
          # To enable once you have a Developer ID: add these as repository
          # secrets and uncomment this block.
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Cairn ${{ github.ref_name }}"
          releaseBody: |
            Download an installer for your platform from the assets below.

            **macOS:** these builds are not yet notarized — on first launch,
            right-click the app and choose **Open** to get past Gatekeeper.
            **Linux:** use the .AppImage (portable), or the .deb / .rpm for your distro.
          releaseDraft: true
          # Published as a normal (non-prerelease) "latest" release so the
          # updater endpoint (/releases/latest/download/latest.json) resolves.
          prerelease: false
          args: ${{ matrix.args }}
